---
layout: default
---

<header>
    <div class="container">
        <h1>{{ page.title }}</h1>
        <p style="font-size: 1.2em; opacity: 0.95;">{{ page.description }}</p>
    </div>
</header>

<main>
    <div class="container">
        <article>
            {{ content }}

            <section style="background: #f0f4ff; padding: 30px; border-radius: 8px; margin-top: 60px; text-align: center;">
                <h3 style="color: #667eea; margin-bottom: 15px;">Ready to Fix Your Hosting?</h3>
                <p style="margin-bottom: 20px; font-size: 1.05em;">
                    Explore our detailed hosting comparison guides to find the right provider for your needs.
                </p>
                <a href="/" style="display: inline-block; background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 14px 30px; border-radius: 5px; text-decoration: none; font-weight: 600;">View All Comparisons</a>
            </section>
        </article>
    </div>
</main>
