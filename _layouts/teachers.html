<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} - Ampicked{% else %}Ampicked - Web Hosting Reviews & Comparisons for WordPress{% endif %}</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}Find the best WordPress hosting for your needs. Compare hosting providers by budget, performance, features, or use case. Expert reviews, teacher resources, and benchmarks for educators and students.{% endif %}">
    <meta name="keywords" content="{% if page.keywords %}{{ page.keywords }}{% else %}WordPress hosting, web hosting reviews, best hosting providers, hosting comparison{% endif %}">
    <meta name="author" content="Ampicked">

    <!-- Favicon - Multiple sizes for different devices -->
    <link rel="icon" type="image/x-icon" href="{{ '/assets/images/favicon.ico' | relative_url }}">
    <link rel="icon" type="image/svg+xml" href="{{ '/assets/images/favicon.svg' | relative_url }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ '/assets/images/favicon-16x16.png' | relative_url }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/images/favicon-32x32.png' | relative_url }}">
    <link rel="icon" type="image/png" sizes="96x96" href="{{ '/assets/images/favicon-96x96.png' | relative_url }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/images/apple-touch-icon.png' | relative_url }}">
    <link rel="manifest" href="{{ '/assets/images/site.webmanifest' | relative_url }}">

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-QKR6GF3W3X"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-QKR6GF3W3X');
    </script>

    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2944839655624416"
        crossorigin="anonymous"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f8f9fa;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Navigation */
        nav {
            background: #333;
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            max-height: 70px;
        }

        nav .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav a, nav span {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: #667eea;
        }

        nav .logo-link {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: white;
            transition: opacity 0.3s ease;
        }

        nav .logo-link:hover {
            opacity: 0.8;
        }

        nav .logo-svg {
            height: 40px;
            width: auto;
            display: block;
            flex-shrink: 0;
            object-fit: contain;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* Teachers Page Specific */
        .teachers-page {
            background: white;
        }

        .teachers-header {
            background: linear-gradient(135deg, #4a90e2 0%, #357abd 100%);
            color: white;
            padding: 80px 0;
            text-align: center;
        }

        .teachers-header h1 {
            font-size: 3em;
            margin: 0 0 20px 0;
            font-weight: 700;
        }

        .teachers-header p {
            font-size: 1.3em;
            margin: 0;
            opacity: 0.95;
        }

        /* Footer */
        footer {
            background: #333;
            color: white;
            padding: 40px 0;
            text-align: center;
            margin-top: 60px;
        }

        footer p {
            margin: 10px 0;
        }

        footer a {
            color: #667eea;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .teachers-header h1 {
                font-size: 2em;
            }

            .teachers-section h2 {
                font-size: 1.5em;
            }

            .nav-links {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    {% include nav.html %}

    <div class="teachers-page">
        {{ content }}
    </div>

    {% include footer.html %}
</body>
</html>
