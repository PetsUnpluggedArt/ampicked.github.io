---
layout: default
---

<div style="padding: 60px 20px;">
    <div style="max-width: 1200px; margin: 0 auto;">
        <header style="margin-bottom: 60px; text-align: center; padding-bottom: 40px; border-bottom: 3px solid #f5576c;">
            <h1 style="color: #333; font-size: 2.8em; margin-bottom: 20px; line-height: 1.2;">{{ page.title }}</h1>
            <p style="font-size: 1.15em; color: #666; margin: 0; max-width: 600px; margin-left: auto; margin-right: auto;">{{ page.description }}</p>
        </header>

        <div style="background: white; padding: 40px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08); margin-bottom: 40px;">
            {{ content }}
        </div>

        <section style="background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%); color: white; padding: 50px 40px; border-radius: 8px; text-align: center; box-shadow: 0 4px 15px rgba(245, 87, 108, 0.3);">
            <h3 style="margin-bottom: 15px; font-size: 1.5em; font-weight: 700;">Not Sure Which Provider to Choose?</h3>
            <p style="margin-bottom: 30px; font-size: 1.1em; line-height: 1.7; opacity: 0.95; margin: 15px 0 30px 0;">
                Our interactive quiz analyzes your specific needs and recommends the best hosting provider for you in minutes.
            </p>
            <a href="/quiz/" style="display: inline-block; background: white; color: #f5576c; padding: 14px 40px; border-radius: 5px; text-decoration: none; font-weight: 700; font-size: 1.05em;">Take the Comparison Quiz →</a>
        </section>
    </div>
</div>
