---
layout: default
---

<div style="padding: 60px 20px;">
    <div style="max-width: 800px; margin: 0 auto;">
        <header style="margin-bottom: 40px;">
            <h1 style="color: #333; font-size: 2.2em; margin-bottom: 12px;">{{ page.title }}</h1>
            <p style="font-size: 0.95em; opacity: 0.7; color: #666; margin: 0;">{{ page.date | date: "%B %d, %Y" }}</p>
        </header>

        <article>
            {{ content }}

            <section style="background: #f0f4ff; padding: 40px; border-radius: 8px; margin-top: 60px; text-align: center; border-left: 4px solid #667eea;">
                <h3 style="color: #667eea; margin-bottom: 15px; font-size: 1.3em;">Ready to Choose Better Hosting?</h3>
                <p style="margin-bottom: 25px; font-size: 1.05em; color: #555; line-height: 1.6;">
                    Take our quick 5-question quiz to get a personalized hosting recommendation based on your needs.
                </p>
                <div style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
                    <a href="/quiz/" style="display: inline-block; background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 14px 30px; border-radius: 5px; text-decoration: none; font-weight: 600;">Take the Quiz</a>
                    <a href="/blog/" style="display: inline-block; background: white; color: #667eea; padding: 14px 30px; border-radius: 5px; text-decoration: none; font-weight: 600; border: 2px solid #667eea;">Back to Blog</a>
                </div>
            </section>
        </article>
    </div>
</div>
