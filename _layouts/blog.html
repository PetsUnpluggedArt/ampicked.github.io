---
layout: default
---

<header>
    <div class="container">
        <h1>{{ page.title }}</h1>
        <p style="font-size: 1em; opacity: 0.8; margin-top: 8px;">{{ page.date | date: "%B %d, %Y" }}</p>
    </div>
</header>

<main>
    <div class="container">
        <article style="max-width: 800px; margin: 0 auto;">
            {{ content }}

            <section style="background: #f0f4ff; padding: 30px; border-radius: 8px; margin-top: 60px; text-align: center;">
                <h3 style="color: #667eea; margin-bottom: 15px;">Need Help Choosing a Host?</h3>
                <p style="margin-bottom: 20px; font-size: 1.05em;">
                    Take our quick 5-question quiz to get a personalized hosting recommendation.
                </p>
                <a href="/quiz/" style="display: inline-block; background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 14px 30px; border-radius: 5px; text-decoration: none; font-weight: 600; margin-right: 15px;">Take the Quiz</a>
                <a href="/blog/" style="display: inline-block; background: #ddd; color: #333; padding: 14px 30px; border-radius: 5px; text-decoration: none; font-weight: 600;">Back to Blog</a>
            </section>
        </article>
    </div>
</main>
