# Ampicked Jekyll Configuration
title: Ampicked
description: Expert WordPress Hosting Reviews & Comparisons
baseurl: ""
url: "https://ampicked.com"
author: "Tony Johnson"

# Build settings
markdown: kramdown
theme: null
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

# Exclude from processing
exclude:
  - .gitignore
  - README.md
  - Gemfile
  - Gemfile.lock

# Collections
collections:
  posts:
    output: true
    permalink: /:title/
  comparisons:
    output: true
    permalink: /providers/:title/

# Defaults
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "blog"
  - scope:
      path: ""
      type: "comparisons"
    values:
      layout: "comparison"

# Analytics
google_analytics: G-QKR6GF3W3X
