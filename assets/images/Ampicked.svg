<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="ampGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <rect width="100" height="100" rx="8" fill="url(#ampGradient)"/>

  <!-- Letter A -->
  <text x="50" y="70" font-family="Arial, sans-serif" font-size="60" font-weight="700" text-anchor="middle" fill="white">A</text>
</svg>
